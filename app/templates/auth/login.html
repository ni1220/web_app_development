{% extends "base.html" %}
{% block title %}登入{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow mt-4">
      <div class="card-body p-4">
        <h1 class="h4 fw-bold text-center mb-4">
          <i class="bi bi-box-arrow-in-right me-2"></i>登入
        </h1>

        <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">帳號</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username"
                     placeholder="請輸入帳號" value="{{ request.form.get('username', '') }}"
                     required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">密碼</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="請輸入密碼" required>
            </div>
          </div>
          <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i> 登入
          </button>
        </form>

        <hr class="my-4">
        <p class="text-center text-muted mb-0">
          還沒有帳號？
          <a href="{{ url_for('auth.register') }}" class="fw-semibold text-dark">立即註冊</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
