{% extends "base.html" %}
{% block title %}註冊{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow mt-4">
      <div class="card-body p-4">
        <h1 class="h4 fw-bold text-center mb-4">
          <i class="bi bi-person-plus me-2"></i>建立帳號
        </h1>

        <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">帳號 <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-person"></i></span>
              <input type="text" class="form-control" id="username" name="username"
                     placeholder="3–50 個字元" value="{{ request.form.get('username', '') }}"
                     minlength="3" maxlength="50" required autofocus>
            </div>
          </div>
          <div class="mb-3">
            <label for="nickname" class="form-label fw-semibold">暱稱 <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-star"></i></span>
              <input type="text" class="form-control" id="nickname" name="nickname"
                     placeholder="顯示在頁面上的名稱" value="{{ request.form.get('nickname', '') }}"
                     maxlength="50" required>
            </div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">密碼 <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="至少 6 個字元" minlength="6" required>
            </div>
          </div>
          <div class="mb-4">
            <label for="confirm_password" class="form-label fw-semibold">確認密碼 <span class="text-danger">*</span></label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                     placeholder="再次輸入密碼" minlength="6" required>
            </div>
          </div>
          <button type="submit" class="btn btn-dark w-100 py-2 fw-semibold">
            <i class="bi bi-person-plus me-1"></i> 建立帳號
          </button>
        </form>

        <hr class="my-4">
        <p class="text-center text-muted mb-0">
          已有帳號？
          <a href="{{ url_for('auth.login') }}" class="fw-semibold text-dark">立即登入</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
