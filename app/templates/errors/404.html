{% extends "base.html" %}
{% block title %}404 — 找不到頁面{% endblock %}

{% block content %}
<div class="text-center py-5">
  <div class="display-1 fw-bold text-muted">404</div>
  <h1 class="h3 mt-3 mb-2">找不到此頁面</h1>
  <p class="text-muted mb-4">您要尋找的頁面不存在，可能已被刪除或網址有誤。</p>
  <a href="{{ url_for('index') }}" class="btn btn-dark px-4">
    <i class="bi bi-house me-1"></i> 回到首頁
  </a>
</div>
{% endblock %}
