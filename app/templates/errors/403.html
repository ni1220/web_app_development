{% extends "base.html" %}
{% block title %}403 — 無存取權限{% endblock %}

{% block content %}
<div class="text-center py-5">
  <div class="display-1 fw-bold text-danger">403</div>
  <h1 class="h3 mt-3 mb-2">您沒有存取此頁面的權限</h1>
  <p class="text-muted mb-4">此頁面需要特定的身份或權限才能瀏覽。</p>
  <div class="d-flex gap-2 justify-content-center">
    <a href="{{ url_for('index') }}" class="btn btn-dark px-4">
      <i class="bi bi-house me-1"></i> 回到首頁
    </a>
    {% if not current_user.is_authenticated %}
      <a href="{{ url_for('auth.login') }}" class="btn btn-outline-dark px-4">
        <i class="bi bi-box-arrow-in-right me-1"></i> 登入
      </a>
    {% endif %}
  </div>
</div>
{% endblock %}
